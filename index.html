<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Экзистенциальный VR-Демонтаж ДНК</title>
    <!-- ПОДДКЛЮЧЕНА ЖЕЛЕЗОБЕТОННАЯ СТАБИЛЬНАЯ ССЫЛКА НА AFRAME -->
    <script src="https://aframe.io"></script>

    <script>
      AFRAME.registerComponent('dna-generator', {
        init: function () {
          const matrixContainer = this.el;
          
          // Тестовая последовательность букв ДНК
          const dnaSequence = "ATGCTAGCTAGCTAGCTAGCTAGCGATCGATCGATCGATCGATCGATTTTTACGTATGCTAGCTAGC";
          
          // Индифферентные, бездушные цвета для деконструкции формы
          const colors = { 'A': '#ffffff', 'T': '#b0b0b0', 'C': '#505050', 'G': '#101010' };

          // Упрощенный, легкий линейный алгоритм без вложенных циклов
          // Строим куб из букв простым распределением по сетке
          const step = 2; // Расстояние между кубиками в метрах
          const sideSize = Math.ceil(Math.pow(dnaSequence.length, 1/3));

          for (let i = 0; i < dnaSequence.length; i++) {
            const char = dnaSequence[i];
            const color = colors[char] || '#808080';

            // Переводим одномерный индекс строки в 3D координаты (x, y, z)
            const x = i % sideSize;
            const y = Math.floor((i / sideSize) % sideSize);
            const z = Math.floor(i / (sideSize * sideSize));

            const box = document.createElement('a-box');
            
            // Центрируем облако кубиков перед стартовой камерой
            const posX = (x - sideSize / 2) * step;
            const posY = (y - sideSize / 2) * step + 2; // Приподнимем над виртуальным полом
            const posZ = (z - sideSize / 2) * step;

            box.setAttribute('position', `${posX} ${posY} ${posZ}`);
            box.setAttribute('width', '1');
            box.setAttribute('height', '1');
            box.setAttribute('depth', '1');
            box.setAttribute('color', color);
            box.setAttribute('roughness', '0.9'); // Полностью матовые кубы

            matrixContainer.appendChild(box);
          }
          console.log("Генератор ДНК: 3D инсталляция успешно выведена на экран!");
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <!-- Глубокое черное пространство -->
      <a-sky color="#050505"></a-sky>

      <!-- Настройка базового освещения граней -->
      <a-light type="ambient" color="#666"></a-light>
      <a-light type="directional" color="#fff" position="-1 4 2"></a-light>

      <!-- Точка старта (Камера отодвинута назад на 10 метров, чтобы куб был виден сразу) -->
      
        <a-camera></a-camera>
      

      <!-- Контейнер для генерации кубов -->
      
    </a-scene>
  </body>
</html>
