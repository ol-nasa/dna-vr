<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DNA Space</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="ui">

    <h1>DNA SPACE</h1>

    <div class="panel">

        <input
            id="fileInput"
            type="file"
            accept=".gb,.gbk,.gbff,.fa,.fasta,.fna">

        <button id="loadButton">
            Построить мир
        </button>

    </div>

    <div class="panel">

        <label>

            Размер кубика

            <input
                id="cubeSize"
                type="range"
                min="0.2"
                max="2"
                value="0.5"
                step="0.1">

        </label>

        <label>

            Расстояние

            <input
                id="spacing"
                type="range"
                min="0.5"
                max="5"
                value="1.0"
                step="0.1">

        </label>

    </div>

    <div class="panel">

        <label>

            Высота

            <input
                id="heightScale"
                type="range"
                min="0.2"
                max="8"
                value="1"
                step="0.1">

        </label>

    </div>

    <div id="status">

        Выберите файл GenBank или FASTA

    </div>

</div>

<div id="canvas"></div>

<script type="importmap">
{
    "imports": {
        "three":"https://unpkg.com/three@0.167/build/three.module.js",
        "three/addons/":"https://unpkg.com/three@0.167/examples/jsm/"
    }
}
</script>

<script type="module" src="app.js"></script>

</body>

</html>
